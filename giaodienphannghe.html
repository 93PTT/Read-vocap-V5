<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">




<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:600px;
		border-radius: 20px;
		margin:auto;
		background-image: url("cat5.png");
    		background-size: cover;
    		background-position: center;
		background-repeat: no-repeat;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.cat5-img{
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
	}




	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2 {
  		width:300px;
		height:100px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;
	}

	

</style>
</head>





<body>
	<div class="app-container">
		<div class="card-1">
			<div class="box-1">
				<img src="audio.gif" class="gif">
			</div>
			<div class="box-2" id="box-2"></div>
		</div>
	</div>


<script>

// =====================
// CONFIG
// =====================
const API = "https://tts.thanhtam-phan1993.workers.dev";

// =====================
// STATE
// =====================
let selectedList = { words: [] };
let index = 0;
let isRunning = false;
let isUnlocked = false;

// =====================
// UI
// =====================
const box2 = document.getElementById("box-2");

// =====================
// LOAD DATA
// =====================
function loadData(){
  try {
    const raw = localStorage.getItem("selectedList");
    console.log("RAW:", raw);

    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.words)) {
        selectedList = parsed;
      }
    }

  } catch (e) {
    console.log("LOAD ERROR:", e);
  }

  console.log("WORDS:", selectedList.words);

  if (!selectedList.words.length) {
    box2.textContent = "KHÔNG CÓ DỮ LIỆU";
  }
}

// =====================
// SHUFFLE (optional)
// =====================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

// =====================
// DELAY
// =====================
function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

// =====================
// AUDIO UNLOCK (iOS + Chrome safe)
// =====================
async function unlockAudio(){
  const audio = new Audio();
  audio.src = "data:audio/mp3;base64,//uQxAAAA";

  try {
    await audio.play();
    audio.pause();
    isUnlocked = true;
    console.log("AUDIO UNLOCKED");
  } catch(e){
    console.log("UNLOCK FAIL:", e);
  }
}

// =====================
// CREATE AUDIO
// =====================
function createAudio(text, lang){
  const url = `${API}?text=${encodeURIComponent(text)}&lang=${lang}`;
  const audio = new Audio(url);
  audio.preload = "auto";
  return audio;
}

// =====================
// PLAY AUDIO SAFE
// =====================
function playAudio(audio){
  return new Promise((resolve)=>{

    try {
      audio.currentTime = 0;

      const p = audio.play();

      if (p && p.catch) {
        p.catch(err=>{
          console.log("PLAY BLOCKED:", err);
          resolve();
        });
      }

    } catch(e){
      console.log("PLAY ERROR:", e);
      resolve();
      return;
    }

    audio.onended = ()=> resolve();
    audio.onerror = (e)=>{
      console.log("AUDIO ERROR:", e);
      resolve();
    };
  });
}

// =====================
// MAIN LOOP
// =====================
async function run(){

  if (!selectedList.words.length) {
    box2.textContent = "KHÔNG CÓ TỪ";
    return;
  }

  isRunning = true;

  box2.textContent = "START...";

  while(index < selectedList.words.length && isRunning){

    const w = selectedList.words[index];
    if (!w) break;

    box2.textContent = `${index+1}/${selectedList.words.length} - ${w.en}`;

    // VI
    const viAudio = createAudio(w.vi, "vi");
    await playAudio(viAudio);
    await delay(200);

    // EN
    const enAudio = createAudio(w.en, "en");
    await playAudio(enAudio);
    await delay(500);

    index++;
  }

  box2.textContent = "FINISH";

  isRunning = false;
  index = 0;
}

// =====================
// START APP
// =====================
async function startApp(){

  if (isRunning) return;

  if (!isUnlocked) {
    await unlockAudio();
  }

  await run();
}

// =====================
// INIT (FIX PC + MOBILE)
// =====================
function init(){

  console.log("INIT APP");

  loadData();

  box2.textContent = "CLICK / TAP ĐỂ BẮT ĐẦU";

  function startOnce(){
    document.removeEventListener("click", startOnce);
    document.removeEventListener("touchstart", startOnce);

    console.log("USER STARTED");

    unlockAudio();
    startApp();
  }

  document.addEventListener("click", startOnce);
  document.addEventListener("touchstart", startOnce);
}

init();
</script>
</body>
</html>
