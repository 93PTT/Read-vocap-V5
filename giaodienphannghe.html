<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">




<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:600px;
		border-radius: 20px;
		margin:auto;
		background-image: url("cat5.png");
    		background-size: cover;
    		background-position: center;
		background-repeat: no-repeat;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.cat5-img{
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
	}




	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2 {
  		width:300px;
		height:100px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;
	}

	

</style>
</head>





<body>
	<div class="app-container">
		<div class="card-1">
			<div class="box-1">
				<img src="audio.gif" class="gif">
			</div>
			<div class="box-2" id="box-2"></div>
		</div>
	</div>


<script>
// =====================
// CONFIG
// =====================
const API = "https://tts.thanhtam-phan1993.workers.dev";

// =====================
// STATE
// =====================
let selectedList = null;
let index = 0;
let isRunning = false;
let isUnlocked = false;
let isPaused = false;
let currentAudio = null;

// =====================
// LOAD DATA
// =====================
try {
  selectedList = JSON.parse(localStorage.getItem('selectedList'));
} catch (e) {
  selectedList = null;
}

const box2 = document.getElementById('box-2');

if (!selectedList || !selectedList.words?.length) {
  box2.textContent = "Không có dữ liệu";
  throw new Error("No data");
}

// =====================
// SHUFFLE
// =====================
function shuffleArray(arr){
  for (let i = arr.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffleArray(selectedList.words);

// =====================
// DELAY
// =====================
function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}

// =====================
// STOP AUDIO SAFELY
// =====================
function stopCurrentAudio(){
  if (currentAudio) {
    try {
      currentAudio.pause();
      currentAudio.src = "";
    } catch(e){}
    currentAudio = null;
  }
}

// =====================
// PLAY AUDIO (iOS SAFE)
// =====================
function playAudio(text, lang){
  return new Promise((resolve) => {

    if (!isRunning) return resolve();
    if (isPaused) return resolve();

    stopCurrentAudio();

    const audio = new Audio();
    currentAudio = audio;

    const url = `${API}?text=${encodeURIComponent(text)}&lang=${lang}`;
    audio.src = url;
    audio.preload = "auto";

    let done = false;

    const finish = () => {
      if (done) return;
      done = true;

      if (currentAudio === audio) {
        currentAudio = null;
      }

      resolve();
    };

    audio.onended = finish;
    audio.onerror = finish;

    audio.play().catch(err => {
      console.log("play blocked:", err);
      finish();
    });
  });
}

// =====================
// MAIN LOOP
// =====================
async function playLoop(){
  isRunning = true;

  while (index < selectedList.words.length){

    if (!isRunning) break;

    // pause support
    while (isPaused) {
      await delay(200);
    }

    const word = selectedList.words[index];
    if (!word) break;

    // show text
    box2.textContent = word.en;

    // VI
    await playAudio(word.vi, "vi");
    await delay(250);

    // EN
    await playAudio(word.en, "en");
    await delay(900);

    index++;
  }

  box2.textContent = "FINISH";

  // reset
  index = 0;
  isRunning = false;
}

// =====================
// UNLOCK AUDIO (iOS REQUIRED)
// =====================
async function unlockAudio(){
  const audio = new Audio();

  // stable iOS unlock trick
  audio.src = "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAA";

  try {
    await audio.play();
    audio.pause();
    isUnlocked = true;
  } catch (e) {
    console.log("unlock failed:", e);
  }
}

// =====================
// TOGGLE START / PAUSE
// =====================
async function startOrResume(){

  if (!isUnlocked) {
    await unlockAudio();
  }

  if (!isRunning) {
    isPaused = false;
    playLoop();
    return;
  }

  // toggle pause
  isPaused = !isPaused;

  if (!isPaused) {
    console.log("resumed");
  } else {
    console.log("paused");
    stopCurrentAudio();
  }
}

// =====================
// EVENT (iOS BEST: touchstart + click fallback)
// =====================
const card = document.querySelector('.card-1');

card.addEventListener("touchstart", async (e) => {
  e.preventDefault();
  await startOrResume();
});

card.addEventListener("click", async () => {
  await startOrResume();
});
</script>
</body>
</html>
