<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">




<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:600px;
		border-radius: 20px;
		margin:auto;
		background-image: url("cat5.png");
    		background-size: cover;
    		background-position: center;
		background-repeat: no-repeat;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.cat5-img{
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
	}




	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2 {
  		width:300px;
		height:100px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;
	}

	

</style>
</head>





<body>
	<div class="app-container">
		<div class="card-1">
			<div class="box-1">
				<img src="audio.gif" class="gif">
			</div>
			<div class="box-2" id="box-2"></div>
		</div>
	</div>


<script>

// =====================
// CONFIG
// =====================
const API = "https://tts.thanhtam-phan1993.workers.dev";

// =====================
// STATE
// =====================
let selectedList = { words: [] };
let audioQueue = [];   // 🔥 cache audio
let index = 0;
let isRunning = false;

// =====================
// UI
// =====================
const box2 = document.getElementById("box-2");

// =====================
// LOAD DATA
// =====================
function loadData(){
  try {
    const raw = localStorage.getItem("selectedList");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed?.words?.length) {
        selectedList = parsed;
      }
    }
  } catch(e){
    console.log(e);
  }

  if (!selectedList.words.length) {
    box2.textContent = "KHÔNG CÓ DỮ LIỆU";
  }
}

// =====================
// CREATE AUDIO URL
// =====================
function createUrl(text, lang){
  return `${API}?text=${encodeURIComponent(text)}&lang=${lang}`;
}

// =====================
// PRELOAD AUDIO (QUAN TRỌNG)
// =====================
async function preloadAudio(){

  box2.textContent = "ĐANG LOAD AUDIO...";

  audioQueue = [];

  for (let i = 0; i < selectedList.words.length; i++){

    const w = selectedList.words[i];

    // VI
    const vi = new Audio(createUrl(w.vi, "vi"));
    vi.preload = "auto";

    // EN
    const en = new Audio(createUrl(w.en, "en"));
    en.preload = "auto";

    audioQueue.push({
      vi,
      en,
      text: w.en
    });

    box2.textContent = `LOAD: ${i+1}/${selectedList.words.length}`;

    // delay nhẹ để iPhone không bị nghẽn
    await new Promise(r => setTimeout(r, 80));
  }

  box2.textContent = "LOAD XONG - TAP ĐỂ BẮT ĐẦU";
}

// =====================
// PLAY AUDIO SAFE
// =====================
function play(audio){
  return new Promise(resolve=>{
    audio.currentTime = 0;

    const p = audio.play();

    if (p && p.catch){
      p.catch(()=>resolve());
    }

    audio.onended = ()=> resolve();
    audio.onerror = ()=> resolve();
  });
}

// =====================
// RUN LOOP
// =====================
async function run(){

  if (!audioQueue.length) return;

  isRunning = true;

  while(index < audioQueue.length && isRunning){

    const item = audioQueue[index];

    box2.textContent = `${index+1}/${audioQueue.length} - ${item.text}`;

    // VI
    await play(item.vi);
    await new Promise(r => setTimeout(r, 200));

    // EN
    await play(item.en);
    await new Promise(r => setTimeout(r, 500));

    index++;
  }

  box2.textContent = "FINISH";

  isRunning = false;
  index = 0;
}

// =====================
// START
// =====================
async function start(){

  if (isRunning) return;

  await run();
}

// =====================
// INIT (iPhone SAFE FLOW)
// =====================
async function init(){

  loadData();

  await preloadAudio(); // 🔥 QUAN TRỌNG NHẤT

  function startOnce(){
    document.removeEventListener("click", startOnce);
    document.removeEventListener("touchstart", startOnce);

    start();
  }

  document.addEventListener("click", startOnce);
  document.addEventListener("touchstart", startOnce);
}

init();
</script>
</body>
</html>
