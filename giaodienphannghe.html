<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">




<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:600px;
		border-radius: 20px;
		margin:auto;
		background-image: url("cat5.png");
    		background-size: cover;
    		background-position: center;
		background-repeat: no-repeat;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.cat5-img{
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
	}




	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2 {
  		width:300px;
		height:100px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;
	}

	

</style>
</head>





<body>
	<div class="app-container">
		<div class="card-1">
			<div class="box-1">
				<img src="audio.gif" class="gif">
			</div>
			<div class="box-2" id="box-2"></div>
		</div>
	</div>


<script>
const box2 = document.getElementById("box-2");

let list = [];
let index = 0;
let audio = new Audio();

/* =========================
   LOAD (FIX 100%)
========================= */
function loadData(){

  try{
    const raw = localStorage.getItem("wordLists");

    const all = raw ? JSON.parse(raw) : [];

    if(!Array.isArray(all) || all.length === 0){
      box2.textContent = "Không có dữ liệu";
      return;
    }

    const last = all[all.length - 1];

    list = last.words || [];

    console.log("Loaded list:", last);

  }catch(e){
    console.log("LOAD ERROR", e);
    list = [];
  }
}

/* =========================
   PLAY SAFE
========================= */
function play(url){
  return new Promise(res=>{
    audio.pause();
    audio.src = url;
    audio.load();

    const p = audio.play();
    if(p && p.catch) p.catch(()=>res());

    audio.onended = res;
    audio.onerror = res;
  });
}

/* =========================
   RUN
========================= */
async function run(){

  if(!list.length) return;

  while(index < list.length){

    const item = list[index];

    box2.textContent = item.en;

    await play(item.enUrl);
    await new Promise(r=>setTimeout(r,200));

    await play(item.viUrl);
    await new Promise(r=>setTimeout(r,400));

    index++;
  }

  box2.textContent = "FINISH";
  index = 0;
}

/* =========================
   START
========================= */
function start(){
  run();
}

/* =========================
   INIT
========================= */
function init(){
  loadData();
  document.addEventListener("click", start, {once:true});
}

init();
</script>


</body>
</html>
