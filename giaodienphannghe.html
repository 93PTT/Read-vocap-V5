<script>
const box2 = document.getElementById("box-2");

let list = [];
let index = 0;
let audio = null;

/* =========================
   LOG
========================= */
function log(msg){
  console.log("[APP]", msg);
}

/* =========================
   LOAD DATA
========================= */
function loadData(){
  try {
    const raw = localStorage.getItem("wordLists");

    log("raw data: " + raw);

    const all = JSON.parse(raw || "[]");

    if(!Array.isArray(all) || all.length === 0){
      box2.textContent = "NO DATA";
      return;
    }

    const last = all[all.length - 1];
    list = last.words || [];

    log("words loaded: " + list.length);

  } catch(e){
    console.log("LOAD ERROR", e);
    box2.textContent = "LOAD ERROR";
  }
}

/* =========================
   AUDIO PLAY (iOS SAFE + DETECT BLOCK)
========================= */
function play(url){
  return new Promise(resolve => {

    if(!url){
      resolve("no-url");
      return;
    }

    if(!audio){
      audio = new Audio();
    }

    audio.pause();
    audio.src = url;
    audio.load();

    let finished = false;

    const done = (status) => {
      if(finished) return;
      finished = true;
      resolve(status);
    };

    const p = audio.play();

    if(p && p.catch){
      p.catch(err => {
        console.log("[AUDIO BLOCKED]", err);
        box2.textContent = "AUDIO BLOCKED (iOS)";
        done("blocked");
      });
    }

    audio.onended = () => done("done");

    audio.onerror = () => {
      box2.textContent = "AUDIO ERROR";
      done("error");
    };

    // 🔥 detect silent fail (iOS trick)
    setTimeout(() => {
      if(audio.paused && !finished){
        console.log("[POSSIBLE BLOCK - silent]");
        box2.textContent = "SILENT BLOCK (iOS)";
        done("silent-block");
      }
    }, 1200);

  });
}

/* =========================
   RUN LOOP
========================= */
async function run(){

  if(!list.length){
    box2.textContent = "EMPTY LIST";
    return;
  }

  log("START RUN");

  while(index < list.length){

    const item = list[index];

    // subtitle
    box2.textContent = item.en || "NO TEXT";

    log("show: " + item.en);

    // EN audio
    const r1 = await play(item.enUrl);

    log("EN status: " + r1);

    await new Promise(r => setTimeout(r, 200));

    // VI audio
    const r2 = await play(item.viUrl);

    log("VI status: " + r2);

    await new Promise(r => setTimeout(r, 400));

    index++;
  }

  box2.textContent = "FINISH";
  log("DONE");
}

/* =========================
   START (iOS UNLOCK FIX)
========================= */
function start(){

  log("USER START");

  // 🔥 unlock audio iOS
  const unlock = new Audio();
  unlock.src = "data:audio/mp3;base64,//uQxAA==";
  unlock.play().catch(() => {
    console.log("[UNLOCK FAILED]");
  });

  run();
}

/* =========================
   INIT
========================= */
function init(){

  log("INIT APP");

  loadData();

  document.addEventListener("click", start, { once: true });
  document.addEventListener("touchstart", start, { once: true });
}

init();
</script>
