<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nghe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">




<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:600px;
		border-radius: 20px;
		margin:auto;
		background-image: url("cat5.png");
    		background-size: cover;
    		background-position: center;
		background-repeat: no-repeat;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.cat5-img{
    		width: 100%;
    		height: 100%;
    		object-fit: cover;
	}




	.box-1 {
  		width:170px;
		height:70px;
		margin:auto;
		margin-top:100px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2 {
  		width:300px;
		height:100px;
		margin:auto;
		margin-top:200px;
		border-radius:20px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}


	.gif{
		width:200%;
		height:200%;
		object-fit:contain;
	}

	

</style>
</head>





<body>
	<div class="app-container">
		<div class="card-1">
			<div class="box-1">
				<img src="audio.gif" class="gif">
			</div>
			<div class="box-2" id="box-2"></div>
		</div>
	</div>


<script>
const box2 = document.getElementById("box-2");

let audioQueue = [];
let index = 0;
let isRunning = false;

let selectedList = { words: [] };

/* =========================
   LOAD DATA
========================= */
function loadData() {
  try {
    const raw = localStorage.getItem("wordLists");

    if (!raw) return;

    const lists = JSON.parse(raw);

    // 👉 lấy danh sách cuối cùng
    selectedList = lists[lists.length - 1] || { words: [] };

  } catch (e) {
    console.log("LOAD ERROR:", e);
  }

  if (!selectedList.words.length) {
    box2.textContent = "Không có dữ liệu";
  }
}

/* =========================
   SHUFFLE (optional)
========================= */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* =========================
   BUILD QUEUE
========================= */
function buildQueue() {
  audioQueue = selectedList.words.map(w => ({
    text: w.en,
    vi: w.viAudio,
    en: w.enAudio
  }));
}

/* =========================
   🔥 IMPORTANT: IOS SAFE PLAY
========================= */
function playAudio(url) {
  return new Promise(resolve => {

    const audio = new Audio(url);
    audio.preload = "auto";
    audio.load();

    // iOS trick
    const p = audio.play();

    if (p && p.catch) {
      p.catch(() => resolve());
    }

    audio.onended = () => resolve();
    audio.onerror = () => resolve();

  });
}

/* =========================
   AUDIO UNLOCK (CRITICAL IOS)
========================= */
function unlockAudio() {
  const audio = new Audio();

  audio.play().catch(() => {
    // ignore
  });
}

/* =========================
   MAIN RUN LOOP
========================= */
async function run() {

  if (!audioQueue.length) return;

  isRunning = true;

  while (index < audioQueue.length && isRunning) {

    const item = audioQueue[index];

    box2.textContent = item.text;

    // 🔊 play EN
    await playAudio(item.en);

    await new Promise(r => setTimeout(r, 200));

    // 🔊 play VI
    await playAudio(item.vi);

    await new Promise(r => setTimeout(r, 500));

    index++;
  }

  box2.textContent = "FINISH";

  isRunning = false;
  index = 0;
}

/* =========================
   START (ONLY ENTRY POINT)
========================= */
function startOnce() {

  document.removeEventListener("click", startOnce);
  document.removeEventListener("touchstart", startOnce);

  // 🔥 MUST unlock audio in gesture
  unlockAudio();

  run();
}

/* =========================
   INIT
========================= */
function init() {

  loadData();

  // nếu anh muốn random
  shuffle(selectedList.words);

  buildQueue();

  document.addEventListener("click", startOnce, { once: true });
  document.addEventListener("touchstart", startOnce, { once: true });

}

init();

</script>
</body>
</html>
