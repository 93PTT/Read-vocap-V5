<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghinho</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">



<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
		overflow: hidden;
	}

.header{
	text-align:center;
	margin-top:10px;
}



.cat2-img{
	width:12%;
	max-width:280px;
	border-radius:20px;
}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:360px;
		margin:10px auto;
		background:lightslategray;
		border-radius:30px;
		padding:4px;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.card-2{
		width: 350px;
		height:70px;
		margin:30px auto;
		background:lightslategray;
		border-radius:30px;
		padding:4px;
		display: flex;
		justify-content: center;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);

		
	}




	.box-1{
		width:300px;
		height:100px;
		margin:auto;
		margin-top:20px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2{
		width:300px;
		height: 100px;
		margin:10px auto;
		margin-top:30px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}




	.box-3{
		width:100px;
		height:35px;
		margin-top:-30px;
		margin-left:240px;
		border-radius:10px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:15px;
		font-weight:600;
		color:#555555;
		justify-content:center;
	}


	.box-4{
		width:250px;
		height:35px;
		margin:auto;
		margin-top:10px;
		border-radius:10px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:15px;
		font-weight:600;
		color:#555555;
		justify-content:center;
	}





	.grid-1{
		display:grid;
		grid-template-columns:1fr 1fr 1fr;
		gap:15px;
	}


	.button-1{
		border: none;
		outline: none;
		background: none;
		width: 75px;
		height: 40px;
		border-radius:10px;
		margin:auto;
		margin-left:10px;
		display:flex;
		align-items:center;
		justify-content:center;
		background:whitesmoke;
		font-size:16px;
		font-weight:600;
		color:#555555;
		box-shadow:0 8px 20px rgba(0,0,0,0.38);
		cursor:pointer;
		transition:0.2s;
	}
	
	.button-1:hover{ background:orange; }
	.button-1:active{transform:scale(0.95);}



	.grid-2{
		display:grid;
		grid-template-columns:auto auto;
		gap:5px;
		justify-content:start;
	}



	.button-2{
		border: none;
		outline: none;
		background: none;
		width: 60px;
		height: 40px;
		border-radius:10px;
		margin-top:10px;
		margin-left:10px;
		display:flex;
		align-items:center;
		justify-content:center;
		background:whitesmoke;
		font-size:16px;
		font-weight:550;
		color:#555555;
		box-shadow:0 8px 20px rgba(0,0,0,0.38);
		cursor:pointer;
		transition:0.2s;
	}
	
	.button-2:hover{ background:orange; }
	.button-2:active{transform:scale(0.95);}
	.button-2.active{
  		background: orange;
  		color: white;
	}


	

</style>
</head>





<body>
	<div class="header">
		<img src="cat2.png" class="cat2-img">
	</div>

	<div class="app-container">
		<div class="card-1">
			<div class="grid-2">
    				<button id="btnAnh" class="button-2 active" onclick="showEnglish()">Anh</button>
				<button id="btnViet" class="button-2" onclick="showVietnamese()">Việt</button>
		</div>
			<div class="box box-3" id="btnO3">Từ còn lại</div>
			<div class="box box-1" id="btnO1">Ô 1</div>
			<div class="box box-2" id="btnO2">Ô 2</div>
			<div class="box box-4" id="btnO4">Phiên âm</div>
		</div>

		<div class="card-2 grid-1">
    			<button class="button-1" onclick="backWord()">Back</button>
    			<button class="button-1" onclick="speakWord()">Phát âm</button>
    			<button class="button-1" onclick="nextWord()">Next</button>
		</div>
	</div>




<script>
	let allLists = JSON.parse(localStorage.getItem('wordLists') || '[]');
	let currentList = allLists[0]?.words || [];
	shuffleArray(currentList);

	let currentIndex = 0;
	let mode = 'en'; // mặc định nút Anh sáng
	let showAnswer = false; // ẩn Ô 2 lúc đầu

	// Hiển thị từ
	async function renderWord(){
  	if(currentList.length === 0){
    	document.getElementById('btnO1').innerText = "Không có dữ liệu";
    	document.getElementById('btnO2').innerText = "";
    	return;
  	}

  	let word = currentList[currentIndex];

  	if(mode === 'en'){
    	// Ô 1: Việt | Ô 2: Anh
    	document.getElementById('btnO1').innerText = word.vi;
    	document.getElementById('btnO2').innerText = showAnswer ? word.en : "";
  	}else{
    	// Ô 1: Anh | Ô 2: Việt
    	document.getElementById('btnO1').innerText = word.en;
    	document.getElementById('btnO2').innerText = showAnswer ? word.vi : "";
  	}

	// XỬ LÝ PHIÊN ÂM
	let ipa = await getIPA(word.en);
	let ipaText = "";

	if(mode === 'en'){
  	ipaText = showAnswer ? ipa : "";
	}else{
  	ipaText = ipa;
	}

	document.getElementById('btnO4').innerText = ipaText;


  	document.getElementById('btnO3').innerText =
    	`Còn ${currentList.length - currentIndex - 1} từ`;
	}

	// Nút Next
	function nextWord(){
  	if(currentList.length === 0) return;

  	if(!showAnswer){
    	showAnswer = true; // hiện đáp án
  	}else{
    	if(currentIndex < currentList.length - 1){
      	currentIndex++;
      	showAnswer = false; // sang từ mới thì ẩn lại
    	} else {
      	// Hết danh sách → bắn pháo hoa
      	launchFireworks();
      	return; // không tăng nữa
    	}
  	}

  	renderWord();
	}
	// Nút Anh
	function showEnglish(){
  	mode = 'en';

  	currentIndex = 0;     // reset về từ đầu
  	showAnswer = false;  // ẩn đáp án

  	document.getElementById('btnAnh').classList.add('active');
  	document.getElementById('btnViet').classList.remove('active');

  	renderWord();
	}

	// Nút Việt
	function showVietnamese(){
  	mode = 'vi';

  	currentIndex = 0;     // reset về từ đầu
  	showAnswer = false;  // ẩn đáp án

  	document.getElementById('btnViet').classList.add('active');
  	document.getElementById('btnAnh').classList.remove('active');

  	renderWord();
	}

	// Khởi tạo ban đầu (rất quan trọng)
	showEnglish();

	function shuffleArray(array){
  	for(let i = array.length - 1; i > 0; i--){
    	let j = Math.floor(Math.random() * (i + 1));
    	[array[i], array[j]] = [array[j], array[i]];
  	}
	}

	function speakWord(){
  	if(currentList.length === 0) return;

  	let word = currentList[currentIndex].en; // luôn lấy tiếng Anh

  	let utterance = new SpeechSynthesisUtterance(word);
  	utterance.lang = 'en-US'; // giọng tiếng Anh

  	speechSynthesis.speak(utterance);
	}

	async function getIPA(word){
  	try{
    	let res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    	let data = await res.json();

    	if(data[0].phonetics){
      	for(let p of data[0].phonetics){
        if(p.text) return p.text;
      	}
    	}

    	return "";
  	}catch(e){
    	return "";
  	}
	}

	function backWord() {
  	if(currentList.length === 0) return;

  	if(showAnswer) {
    	// Nếu đang hiển thị đáp án → chỉ ẩn đáp án
    	showAnswer = false;
  	} else {
    	// Nếu đáp án đang ẩn → lùi về từ trước nếu có
    	if(currentIndex > 0){
      	currentIndex--;
      	showAnswer = true; // hiện đáp án luôn khi lùi
    	}
  	}

  	renderWord();
	}


</script>
</body>
</html>
