<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỌC TỪ VỰNG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
	margin:0;
	font-family:'Poppins', sans-serif;
	background:snow;
	overflow: hidden;
}

.app-container{
	max-width:375px;
	margin:auto;
	min-height:100vh;
	display:flex;
	flex-direction:column;
	padding:20px;
}

.header{
	text-align:center;
	margin-top:10px;
}

.cat-img{
	width:100%;
	max-width:280px;
	border-radius:20px;
}

.title{
	margin-top:10px;
	font-size:15px;
	font-weight:600;
	color:#555555;
	font-style: italic;
}

.card-1{
	width: 250px;
	margin: 0px auto;
	background:white;
	border-radius:20px;
	padding:20px;
	margin-top:10px;
	box-shadow:0 20px 50px rgba(0,0,0,0.18);
	position:relative;
}

.card-2{
	background:white;
	border-radius:28px;
	padding:20px;
	margin-top:20px;
	box-shadow:0 20px 50px rgba(0,0,0,0.18);
}

.grid{
	display:grid;
	grid-template-columns:1fr 1fr;
	gap:15px;
}

.box{
	aspect-ratio:1/1;
	border-radius:20px;
	display:flex;
	align-items:center;
	justify-content:center;
	font-size:16px;
	font-weight:600;
	color:#555555;
	cursor:pointer;
	transition:0.2s;
	box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.box1{ background:#FDE2CA; }
.box2{ background:#DDF4E7; }
.box3{ background:#E3ECFF; }
.box4{ background:#F3E5FF; }

.box1:hover{ background:#f7cfae; }
.box2:hover{ background:#ccebdc; }
.box3:hover{ background:#d2ddff; }
.box4:hover{ background:#e7d3ff; }

.box:active{
	transform:scale(0.95);
}

.box-long{
	background:gainsboro;
	border-radius:10px;
	padding:10px 10px;
	width:100%;
	justify-content:center;
	font-size:15px;
	font-weight:600;
	text-align:center;
	cursor:pointer;
	transition:0.2s;
	aspect-ratio: auto; 
	position: relative;
}

.box-long:hover{
	background:lightgray;
}

.box-long:active{
	transform:scale(0.95);
}

.dropdown{
	display:none;
	position:absolute;
	top:120%;
	left:0;
	width:100%;
	background:rgba(255,255,255,0.9);
	backdrop-filter: blur(1px);
	border-radius:12px;
	box-shadow:0 5px 15px rgba(0,0,0,0.1);
	z-index:10;
	max-height:300px;
	overflow-y:auto;
}

.dropdown-item{
	position:relative;
	padding:10px;
	text-align:center;
	font-weight:600;
	border-bottom:1px solid #eee;
	cursor:pointer;
	border-radius:12px;
}

.dropdown-item:last-child{ border-bottom:none; }
.dropdown-item:hover{ background:#f0f0f0; }

.delete-btn{
	position:absolute;
	right:10px;
	top:50%;
	transform:translateY(-50%);
	background:red;
	color:white;
	border:none;
	border-radius:10px;
	padding:2px 8px;
	font-weight:600;
	cursor:pointer;
}

.delete-btn:hover{
	background:#cc0000;
}

/* POPUP XÓA DANH SÁCH */
#confirmPopup{
	display:none;
	position:fixed;
	top:50%;
	left:50%;
	transform:translate(-50%, -50%);
	width:80%;
	max-width:280px;
	background:white;
	border-radius:20px;
	box-shadow:0 10px 30px rgba(0,0,0,0.2);
	z-index:100;
	padding:20px;
	text-align:center;
}

#confirmPopup .message{
	margin-bottom:20px;
	font-weight:600;
	color:#555555;
}

#confirmPopup .btn-container{
	display:flex;
	justify-content:space-between;
	gap:10px;
}

#confirmPopup .btn{
	flex:1;
	padding:10px 0;
	border-radius:10px;
	font-weight:600;
	cursor:pointer;
	box-shadow:0 8px 20px rgba(0,0,0,0.08);
	border:none;
}

#confirmPopup .btn-confirm{ background:#FDE2CA; }
#confirmPopup .btn-confirm:hover{ background:#f7cfae; }

#confirmPopup .btn-cancel{ background:#E3ECFF; }
#confirmPopup .btn-cancel:hover{ background:#d2ddff; }

</style>
</head>
<body>

<div class="app-container">

	<!-- HEADER -->
	<div class="header">
		<img src="cat.png" class="cat-img">
		<div class="title">Hôm nay học gì?</div>
	</div>

	<!-- Ô chọn danh sách -->
	<div class="card-1">
		<div class="box box-long" id="dropdownBox">CHỌN DANH SÁCH TỪ</div>
		<div class="dropdown" id="dropdownList"></div>
	</div>

	<!-- 4 Ô -->
	<div class="card-2">
		<div class="grid">
			<div class="box box1" id="btngiaodienphanchinhta">CHÍNH TẢ</div>
			<div class="box box2" id="btngiaodienphanghinho">GHI NHỚ</div>
			<div class="box box3" id="btngiaodienphannghe">NGHE</div>
			<div class="box box4" id="btnPhatAm">PHÁT ÂM</div>
		</div>
	</div>
</div>

<!-- POPUP XÓA DANH SÁCH -->
<div id="confirmPopup">
	<div class="message">Bạn có muốn xóa danh sách này không?</div>
	<div class="btn-container">
		<button class="btn btn-confirm" id="confirmYes">Xác nhận</button>
		<button class="btn btn-cancel" id="confirmNo">Hủy</button>
	</div>
</div>

<script>
let wordLists = JSON.parse(localStorage.getItem('wordLists') || '[]');
const dropdownBox = document.getElementById('dropdownBox');
const dropdownList = document.getElementById('dropdownList');
let selectedList = null;

let popup = document.getElementById('confirmPopup');
let popupMessage = popup.querySelector('.message');
let popupConfirm = document.getElementById('confirmYes');
let popupCancel = document.getElementById('confirmNo');

let deleteIndex = null;

dropdownBox.onclick = () => {
	dropdownList.innerHTML = '';

	if(wordLists.length === 0){
		let div = document.createElement('div');
		div.className='dropdown-item';
		div.textContent='Tạo danh sách từ mới';
		div.onclick = ()=>{ window.location.href='taodanhsachtu.html'; };
		dropdownList.appendChild(div);
	} else {
		let createDiv = document.createElement('div');
		createDiv.className='dropdown-item';
		createDiv.textContent='Tạo danh sách từ mới';
		createDiv.onclick = ()=>{ window.location.href='taodanhsachtu.html'; };
		dropdownList.appendChild(createDiv);

		wordLists.forEach((list, index) => {
			let div = document.createElement('div');
			div.className='dropdown-item';

			let span = document.createElement('span');
			span.textContent = list.name;
			span.style.display='block';
			span.style.width='100%';
			span.style.textAlign='center';

			let delBtn = document.createElement('button');
			delBtn.className='delete-btn';
			delBtn.textContent='X';
			delBtn.onclick = (e)=>{
				e.stopPropagation(); 
				deleteIndex = index;
				popupMessage.textContent = `Bạn có muốn xóa danh sách "${list.name}" không?`;
				popup.style.display='block';
			};

			div.appendChild(span);
			div.appendChild(delBtn);

			div.onclick = () => {
				selectedList = list;
				localStorage.setItem('selectedList', JSON.stringify(selectedList));
				dropdownBox.textContent = list.name;
				dropdownList.style.display = 'none';
			};

			dropdownList.appendChild(div);
		});
	}
	dropdownList.style.display = dropdownList.style.display==='block' ? 'none' : 'block';
};

// Popup nút xác nhận
popupConfirm.onclick = ()=>{
	if(deleteIndex !== null){
		wordLists.splice(deleteIndex,1);
		localStorage.setItem('wordLists', JSON.stringify(wordLists));
		dropdownBox.textContent='CHỌN DANH SÁCH TỪ';
		dropdownList.style.display='none';
		popup.style.display='none';
		deleteIndex = null;
	}
};

popupCancel.onclick = ()=>{
	popup.style.display='none';
	deleteIndex = null;
};

// Link 4 ô học
function startLearning(url){
	if(!selectedList){
		alert("Vui lòng chọn danh sách từ trước!");
		return;
	}
	window.location.href = url;
}

document.getElementById('btngiaodienphanchinhta').onclick = ()=>startLearning('giaodienphanchinhta.html');
document.getElementById('btngiaodienphanghinho').onclick = ()=>startLearning('giaodienphanghinho.html');
document.getElementById('btngiaodienphannghe').onclick = ()=>startLearning('giaodienphannghe.html');
document.getElementById('btnPhatAm').onclick = ()=>startLearning('phatam.html');

</script>
</body>
</html>
