<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỌC TỪ VỰNG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">



<style>
	*{box-sizing:border-box;}

	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
		overflow: hidden;
	}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:20px;
	}



	.header{
		text-align:center;
		margin-top:10px;
	}


	.cat-img{
		width:100%;
		max-width:280px;
		border-radius:20px;
	}


	.title{
		margin-top:10px;
		font-size:15px;
		font-weight:600;
		color:#555555;
		font-style: italic;
	}


	.card-1{
		width: 250px; /* nhỏ hơn container max-width 375px */
		margin: 0px auto; /* căn giữa card */
		background:white;
		border-radius:20px;
		padding:20px;
		margin-top:10px; /* đẩy xuống dưới */
		box-shadow:0 20px 50px rgba(0,0,0,0.18);
		position:relative;
	}


	.card-2{
		background:white;
		border-radius:28px;
		padding:20px;
		margin-top:20px; /* đẩy xuống dưới */
		box-shadow:0 20px 50px rgba(0,0,0,0.18);
	}



	.grid{
		display:grid;
		grid-template-columns:1fr 1fr;
		gap:15px;
	}



	.box{
		aspect-ratio:1/1;
		border-radius:20px;
		display:flex;
		align-items:center;
		justify-content:center;
		font-size:16px;
		font-weight:600;
		color:#555555;
		cursor:pointer;
		transition:0.2s;
		box-shadow:0 8px 20px rgba(0,0,0,0.08);
	}



	.box1{ background:#FDE2CA; }
	.box2{ background:#DDF4E7; }
	.box3{ background:#E3ECFF; }
	.box4{ background:#F3E5FF; }

	.box1:hover{ background:#f7cfae; }
	.box2:hover{ background:#ccebdc; }
	.box3:hover{ background:#d2ddff; }
	.box4:hover{ background:#e7d3ff; }

	.box:active{
		transform:scale(0.95);
	}


	.box-long{
		background:gainsboro;
		border-radius:10px;
		padding:10px 10px;
		width:100%;
		justify-content:center;
		font-size:15px;
		font-weight:600;
		text-align:center;
		cursor:pointer;
		transition:0.2s;
		aspect-ratio: auto; 
	}


	.box-long:hover{
		background:lightgray;
	}

	.box-long:active{
		transform:scale(0.95);
	}



	.dropdown{
		display:none;
		position:absolute;
		top:120%;
		left:0;
		width:100%;
		background:rgba(255,255,255,0.7);
		backdrop-filter: blur(1px);
		border-radius:12px;
		box-shadow:0 5px 15px rgba(0,0,0,0.1);
		z-index:10;
	}

	.dropdown-item{
		padding:10px;
		text-align:center;
		font-weight:600;
		border-bottom:1px solid #eee;
		cursor:pointer;
		border-radius:12px;
	}

	.dropdown-item:last-child{ border-bottom:none; }
	.dropdown-item:hover{ background:#f0f0f0; }

</style>
</head>









<body>

	<div class="app-container">

  	<!-- HEADER -->
  	<div class="header">
		<img src="cat.png" class="cat-img">
		<div class="title">Hôm nay học gì?</div>
	</div>

  	<!-- Ô chọn danh sách -->
	<div class="card-1">
    		<div class="box box-long" id="dropdownBox">CHỌN DANH SÁCH TỪ</div>
    		<div class="dropdown" id="dropdownList"></div>
  	</div>


  	<!-- 4 Ô -->
  	<div class="card-2">
    		<div class="grid">
      		<div class="box box1" id="btnChinhTa">CHÍNH TẢ</div>
      		<div class="box box2" id="btnGhiNho">GHI NHỚ</div>
      		<div class="box box3" id="btnNghe">NGHE</div>
      		<div class="box box4" id="btnPhatAm">PHÁT ÂM</div>
    	</div>
  	</div>
</div>





<script>
	// Dropdown danh sách từ
	let wordLists = JSON.parse(localStorage.getItem('wordLists') || '[]');
	const dropdownBox = document.getElementById('dropdownBox');
	const dropdownList = document.getElementById('dropdownList');
	let selectedList = null;

	dropdownBox.onclick = () => {
  	dropdownList.innerHTML = '';
  	if(wordLists.length === 0){
    	let div = document.createElement('div');
    	div.className='dropdown-item';
    	div.textContent='Tạo danh sách từ mới';
    	div.onclick = ()=>{ window.location.href='taodanhsachtu.html'; };
    	dropdownList.appendChild(div);
  	} else {
    	let createDiv = document.createElement('div');
    	createDiv.className='dropdown-item';
    	createDiv.textContent='Tạo danh sách từ mới';
    	createDiv.onclick = ()=>{ window.location.href='taodanhsachtu.html'; };
    	dropdownList.appendChild(createDiv);

    	wordLists.forEach(list=>{
      	let div = document.createElement('div');
      	div.className='dropdown-item';
      	div.textContent=list.name;
      	div.onclick=()=>{
        selectedList=list;
        localStorage.setItem('selectedList', JSON.stringify(selectedList));
        dropdownBox.textContent=list.name;
        dropdownList.style.display='none';
      	};
      	dropdownList.appendChild(div);
    	});
  	}
  	dropdownList.style.display = dropdownList.style.display==='block' ? 'none' : 'block';
	};


	// Link 4 ô học
	function startLearning(url){
  	if(!selectedList){
    	alert("Vui lòng chọn danh sách từ trước!");
    	return;
  	}
  	window.location.href = url;
	}

	document.getElementById('btnChinhTa').onclick = ()=>startLearning('chinhta.html');
	document.getElementById('btnGhiNho').onclick = ()=>startLearning('ghinho.html');
	document.getElementById('btnNghe').onclick = ()=>startLearning('nghe.html');
	document.getElementById('btnPhatAm').onclick = ()=>startLearning('phatam.html');
</script>
</body>
</html>
