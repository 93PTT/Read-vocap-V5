<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chính tả</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">


	


	


<style>
	* { box-sizing: border-box; margin:0; padding:0; }

	body {
  		font-family: 'Poppins', sans-serif;
  		background: snow;
  		display:flex;
  		justify-content:center;
  		padding:20px 10px;
		overflow: hidden;
		position: fixed;
		width: 100%;
	}



	/* CARD */
	.app-container { max-width:375px; width:100%; }
	.card {
  	background: linen;
  	border-radius: 20px;
  	padding: 25px 20px;
  	max-width: 375px;
  	width: 100%;
  	box-shadow:0 10px 25px rgba(0,0,0,0.08);
  	position: relative;
  	display: flex;
  	flex-direction: column;
  	justify-content: flex-start;
	}



	/* HEADER HÌNH MÈO */
	.header { text-align:center; margin-bottom:10px; }
	.header img { width:100%; max-width:280px; border-radius:20px; }


	/* COUNTER */
	.counter {
  		position: absolute;
  		top: 10px;
  		right: 15px;
  		font-size: 16px;
  		font-weight: 600;
  		color: #555555;
	}



	/* TỪ TIẾNG VIỆT */
	.viet-group {
  		margin-top: 10px;
  		margin-bottom: 15px;
  		text-align:center;
	}


	.viet-group label {
  		display: block;
  		font-weight: 600;
  		font-size: 15px;
  		color: #555555;
  		margin-bottom: 6px;
	}


	.viet-group input {
  		width: 100%;
  		padding: 15px;
  		border-radius: 12px;
  		border: 1px solid #ddd;
  		font-size: 16px;
  		text-align: center;
	}



	/* NHẬP TIẾNG ANH */
	.en-group {
		margin-top: 10px;
  		text-align:center;
	}


	.en-group input {
  		width: 100%;
  		padding: 15px;
  		border-radius: 12px;
  		border: 1px solid #ddd;
  		font-size: 16px;
  		text-align: center;
	}



	/* BUTTONS */
	.btn {
  		width:48%;
  		padding:14px;
  		border-radius:15px;
  		border:none;
  		font-weight:600;
  		cursor:pointer;
  		background:#DDF4E7;
  		transition:all 0.15s ease;
  		font-size:15px;
  		color:#555555;
	}


	.btn:hover { filter: brightness(0.95); transform: translateY(-2px); }
	.btn:active { transform: scale(0.97); filter: brightness(0.9); }



	/* CONTAINER NÚT DƯỚI */
	.btn-container {
  		display: flex;
  		justify-content: space-between;
  		margin-top: 15px;
	}



	/* FEEDBACK */
	.feedback {
  		text-align: center;
  		font-weight: 600;
  		margin-top: 150px;
  		min-height: 20px;
  		border-radius: 12px;
  		padding: 6px 0;
		height: 35px;
		text-align: center;
		
		justify-content: center
		align-items: center;
	}


	.feedback.correct { background:snow; color:#0a7d3b; }
	.feedback.wrong { background:snow; color:#721c24; }
</style>
</head>












<body>
	<div class="app-container">
  	<div class="header">
    	<img src="cat.png" alt="Cat">
  	</div>
	<div class="card">

    	<!-- Counter -->
    	<div class="counter" id="wordCounter">0 / 0</div>

    	<!-- Từ tiếng Việt -->
    	<div class="viet-group">
      		<label for="vietnameseWord">Từ tiếng Việt</label>
      		<input type="text" id="vietnameseWord" readonly>
    	</div>

	<div class="feedback" id="feedback"></div>

    	<!-- Nhập từ tiếng Anh -->
    	<div class="en-group">
      		<input type="text" id="englishInput" placeholder="Nhập từ tiếng Anh">
    	</div>

    	<!-- 2 nút dưới cùng -->
    	<div class="btn-container">
      		<button class="btn" onclick="goBack()">Quay lại</button>
      		<button class="btn" onclick="skipWord()">Next</button>
    	</div>

  	</div>
</div>


















<script>
	// Lấy danh sách đã chọn
	let selected = JSON.parse(localStorage.getItem('selectedList') || '{}');
	let wordList = selected.words ? [...selected.words] : [];
	let mistakeList = [];
	let currentIndex = 0;

	const vietnameseInput = document.getElementById('vietnameseWord');
	const englishInput = document.getElementById('englishInput');
	const feedback = document.getElementById('feedback');
	const counter = document.getElementById('wordCounter');

	function updateCounter(){
  	counter.textContent = `${currentIndex + 1} / ${wordList.length + mistakeList.length}`;
	}

	function getRandomIndex(){
  	return Math.floor(Math.random() * wordList.length);
	}

	function loadWord(){
  	if(wordList.length === 0){
    	alert("Đã xong danh sách!");
    	window.location.href = "index.html"; 
    	return;
  	}

  	currentIndex = getRandomIndex();
  	vietnameseInput.value = wordList[currentIndex].vi;
  	englishInput.value = '';
  	feedback.textContent = '';
  	feedback.className = 'feedback';
  	updateCounter();
	}

	function speakWord(text){
  	if('speechSynthesis' in window){
  	const utter = new SpeechSynthesisUtterance(text);
    	utter.lang = 'en-US';
    	window.speechSynthesis.speak(utter);
  	}
	}

	function checkSpelling(){
  	if(wordList.length === 0) return;
  	const input = englishInput.value.trim();
  	const correct = wordList[currentIndex].en;

  	if(input.toLowerCase() === correct.toLowerCase()){
    	feedback.textContent = "Chính xác!";
    	feedback.className = 'feedback correct';
    	speakWord(correct);
    	wordList.splice(currentIndex, 1);
  	} else {
    	feedback.textContent = `Sai! Đáp án đúng: ${correct}`;
    	feedback.className = 'feedback wrong';
    	mistakeList.push(wordList[currentIndex]);
    	wordList.splice(currentIndex, 1);
  	}

  	if(wordList.length === 0 && mistakeList.length > 0){
    	wordList = [...mistakeList];
    	mistakeList = [];
  	}

  	setTimeout(loadWord, 1000);
	}

	function goBack(){
  	window.location.href = "index.html";
	}

	function skipWord(){
  	if(wordList.length === 0) return;
  	mistakeList.push(wordList[currentIndex]);
  	wordList.splice(currentIndex, 1);
  	loadWord();
	}

	englishInput.addEventListener("keydown", function(event){
  	if(event.key === "Enter"){
    	event.preventDefault(); // chặn hành vi mặc định
    	checkSpelling();
  	}
	});

	// Load từ đầu tiên khi mở trang
	window.addEventListener('DOMContentLoaded', loadWord);
	englishInput.focus();

</script>
</body>
</html>
