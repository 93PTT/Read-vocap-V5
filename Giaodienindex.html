<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giao diện</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{	
	margin:0;
	font-family:'Poppins',sans-serif;
	background:snow;
	overflow-x:hidden;
	overflow-y:auto;}



.app-container{
	max-width:375px;
	margin:auto;
	min-height:100vh;
	display:flex;
	flex-direction:column;
	padding:20px;}

.card-1{
	width: 350px;
	height:600px;
	border-radius: 20px;
	margin:auto;
	background-image: url("candy.png");
    	background-size: cover;
    	background-position: center;
	background-repeat: no-repeat;
	box-shadow:0 20px 50px rgba(0,0,0,0.38);}



.card-2{
	width:260px;
	height:220px;
	margin:auto;
	margin-top:70px;
	border-radius:20px;
	background:rgba(255, 255, 255, 0.2);
	backdrop-filter: blur(10px);
	display:flex;
	flex-direction:column
	box-shadow:0 8px 20px rgba(0,0,0,0.28);}




.box-1 {
  	width:80px;
	height:80px;
	margin-left:20px;
	margin-top:20px;
	border-radius:20px;
	background-image: url("spell2.png");
    	background-size: cover;
    	background-position: center;
	background-repeat: no-repeat;
	box-shadow:0 8px 20px rgba(0,0,0,0.28);}



.box-2 {
  	width:80px;
	height:80px;
	margin-left:60px;
	margin-top:20px;
	border-radius:20px;
	background-image: url("memorize2.png");
    	background-size: cover;
    	background-position: center;
	background-repeat: no-repeat;
	box-shadow:0 8px 20px rgba(0,0,0,0.28);}




.box-3 {
  	width:80px;
	height:80px;
	margin-left:-220px;
	margin-top:120px;
	border-radius:20px;
	background-image: url("listen2.png");
    	background-size: cover;
    	background-position: center;
	background-repeat: no-repeat;
	box-shadow:0 8px 20px rgba(0,0,0,0.28);}



.box-4 {
  	width:80px;
	height:80px;
	margin-left:60px;
	margin-top:120px;
	border-radius:20px;
	background-image: url("pronounce2.png");
    	background-size: cover;
    	background-position: center;
	background-repeat: no-repeat;
	box-shadow:0 8px 20px rgba(0,0,0,0.28);}






.box:active{
	transform:scale(0.95);}



</style>
</head>
<body>
	<div class="app-container"><div class="card-1">
		<div class="card-2">
			<div class="box-1"></div>
			<div class="box-2"></div>
			<div class="box-3"></div>
			<div class="box-4"></div>
		</div>
	</div>


</body>
</html>
