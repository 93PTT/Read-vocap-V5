<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nhập danh sách từ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">




<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }


	html, body {
  		height: 100%;
	}




	body {
  		font-family: 'Poppins', sans-serif;
  		background: snow;
  		display: flex;
  		justify-content: center;
  		align-items: center;
  		padding: 10px;
	}



	.app-container {
  		width: 100%;
  		max-width: 375px;
  		height: 100%;
  		display: flex;
  		flex-direction: column;
  		justify-content: center;
	}


	.card {
  		background: linen;
  		border-radius: 20px;
  		padding: 20px;
  		box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  		display: flex;
  		flex-direction: column;
  		gap: 15px;
  		height: 90%; /* chiếm gần hết màn hình */
  		overflow-y: auto;
	}



	/* INPUT */
	.input-group {
  		display: flex;
  		flex-direction: column;
  		width: 100%;
	}


	.input-group label {
  		font-weight: 600;
  		font-size: 15px;
  		color: #555555;
  		margin-bottom: 6px;
	}


	.input-group input,
	.input-group textarea {
  		width: 100%;
  		padding: 12px;
  		border-radius: 12px;
  		border: 1px solid #ddd;
  		font-family: 'Poppins', sans-serif;
  		font-size: 14px;
  		transition: 0.2s;
	}



	/* Focus đẹp */
		.input-group input:focus,
		.input-group textarea:focus {
  		outline: none;
  		border-color: #a5b4fc;
  		box-shadow: 0 0 0 2px rgba(165,180,252,0.3);
	}



	/* TEXTAREA */
	textarea {
  		min-height: 200px;  /* tăng chiều cao tối thiểu */
  		max-height: 300px;
  		resize: vertical;
	}



	/* BUTTON */
	.btn {
  		width: 100%;
  		padding: 14px;
  		border-radius: 15px;
  		border: none;
  		font-weight: 600;
  		cursor: pointer;
  		background: gainsboro;
  		transition: all 0.15s ease;
  		font-size: 15px;
  		color: #555555;
  		margin-top: 10px;
	}


	/* Hover */
	.btn:hover {
  		filter: brightness(0.95);
  		transform: translateY(-2px);
	}


	/* Click */
		.btn:active {
  		transform: scale(0.97);
  		filter: brightness(0.9);
	}
</style>
</head>






<body>

	<div class="app-container">
  		<div class="card">


    	<!-- Tên danh sách -->
    	<div class="input-group">
      		<label>Tên danh sách</label>
      		<input type="text" id="listName">
    	</div>



    	<!-- Từ tiếng Anh -->
    	<div class="input-group">
      		<label>Từ tiếng Anh</label>
      		<textarea id="englishWords"></textarea>
    	</div>



    	<!-- Nghĩa tiếng Việt -->
    	<div class="input-group">
      		<label>Nghĩa tiếng Việt</label>
      		<textarea id="vietnameseWords"></textarea>
    	</div>



    	<!-- Button -->
    		<button class="btn" onclick="saveList()">Lưu danh sách</button>
	</div>
</div>








<script>
	function saveList(){
  	const name = document.getElementById('listName').value.trim();
  	const en = document.getElementById('englishWords').value.trim().split('\n');
  	const vi = document.getElementById('vietnameseWords').value.trim().split('\n');

  	if(!name){
    	alert("Vui lòng nhập tên danh sách");
    	return;
  	}

  	if(en.length !== vi.length){
    	alert("Số dòng không khớp!");
    	return;
  	}

  	let result = [];
  	for(let i = 0; i < en.length; i++){
    	result.push({ en: en[i], vi: vi[i] });
  	}


  	// Lấy danh sách đã lưu trước đó
  	let allLists = JSON.parse(localStorage.getItem('wordLists') || '[]');


  	// Thêm danh sách mới
  	allLists.push({ name: name, words: result });


  	// Lưu lại vào localStorage
  	localStorage.setItem('wordLists', JSON.stringify(allLists));

  	alert("Đã lưu danh sách!");

  	// Quay về file index
  	window.location.href = "index.html";
}

</script>
</body>
</html>
