<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- 🔹 CHỈNH ĐỂ ẨN STATUS BAR TRÊN IPHONE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Nhập danh sách từ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: snow;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* 🔹 SAFE AREA CHO IPHONE NOTCH */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

.app-container {
  width: 100%;
  max-width: 375px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card {
  background: linen;
  border-radius: 20px;
  padding: 20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  gap: 15px;
  height: 100%;
  overflow-y: auto;
}

/* INPUT */
.input-group {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.input-group label {
  font-weight: 600;
  font-size: 15px;
  color: #555;
  margin-bottom: 6px;
}

.input-group input,
.input-group textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  transition: 0.2s;
}

.input-group input:focus,
.input-group textarea:focus {
  outline: none;
  border-color: #a5b4fc;
  box-shadow: 0 0 0 2px rgba(165,180,252,0.3);
}

textarea {
  min-height: 180px;
  max-height: 250px;
  resize: vertical;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: gainsboro;
  transition: all 0.15s ease;
  font-size: 15px;
  color: #555;
  margin-top: 10px;
}

.btn:hover {
  filter: brightness(0.95);
  transform: translateY(-2px);
}

.btn:active {
  transform: scale(0.97);
  filter: brightness(0.9);
}

/* 🔥 POPUP NỔI */
#saveMessage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;

  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.3);
  z-index: 999;
}

.saved-box {
  padding: 20px 30px;
  border-radius: 15px;
  background: white;
  font-size: 16px;
  font-weight: 600;
  color: #065f46;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  animation: pop 0.3s ease;
}

@keyframes pop {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="app-container">
  <div class="card">

    <div class="input-group">
      <label>Tên danh sách</label>
      <input type="text" id="listName">
    </div>

    <div class="input-group">
      <label>Từ tiếng Anh</label>
      <textarea id="englishWords"></textarea>
    </div>

    <div class="input-group">
      <label>Nghĩa tiếng Việt</label>
      <textarea id="vietnameseWords"></textarea>
    </div>

    <button class="btn" onclick="saveList()">Lưu danh sách</button>

  </div>
</div>

<!-- 🔥 POPUP NẰM NGOÀI -->
<div id="saveMessage">
  <div class="saved-box">✅ Đã lưu danh sách!</div>
</div>




<script>
const API = "https://tts.thanhtam-phan1993.workers.dev";

/* =========================
   🔊 CONVERT BLOB → BASE64
========================= */
function blobToBase64(blob){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}

/* =========================
   🔊 CALL TTS
========================= */
async function getAudioBlob(text, lang){
  const res = await fetch(`${API}?text=${encodeURIComponent(text)}&lang=${lang}`);
  return await res.blob();
}

/* =========================
   💾 SAVE LIST (MAIN LOGIC)
========================= */
async function saveList(){

  const name = document.getElementById('listName').value.trim();
  const en = document.getElementById('englishWords').value.trim().split('\n');
  const vi = document.getElementById('vietnameseWords').value.trim().split('\n');

  if(!name){
    alert("Vui lòng nhập tên danh sách");
    return;
  }

  if(en.length !== vi.length){
    alert("Số dòng không khớp!");
    return;
  }

  const msg = document.getElementById('saveMessage');
  msg.style.display = 'flex';
  msg.querySelector('.saved-box').textContent = "⏳ Đang tạo audio...";

  let result = [];

  for(let i = 0; i < en.length; i++){

    const wordEn = en[i].trim();
    const wordVi = vi[i].trim();

    try {
      // 🔥 tạo audio song song
      const [enBlob, viBlob] = await Promise.all([
        getAudioBlob(wordEn, "en"),
        getAudioBlob(wordVi, "vi")
      ]);

      result.push({
        en: wordEn,
        vi: wordVi,

        // 🔊 dùng base64 để không mất dữ liệu
        enAudio: await blobToBase64(enBlob),
        viAudio: await blobToBase64(viBlob)
      });

      msg.querySelector('.saved-box').textContent =
        `⏳ Đang xử lý ${i+1}/${en.length}`;

    } catch(e){
      console.log("TTS ERROR:", e);

      result.push({
        en: wordEn,
        vi: wordVi,
        enAudio: "",
        viAudio: ""
      });
    }
  }

  // =========================
  // 💾 SAVE TO LOCALSTORAGE
  // =========================
  let allLists = JSON.parse(localStorage.getItem('wordLists') || '[]');

  allLists.push({
    name: name,
    words: result
  });

  localStorage.setItem('wordLists', JSON.stringify(allLists));

  // =========================
  // ✅ DONE
  // =========================
  msg.querySelector('.saved-box').textContent = "✅ Lưu xong!";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1200);
}
</script>


</body>
</html>
