<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- 🔹 CHỈNH ĐỂ ẨN STATUS BAR TRÊN IPHONE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Nhập danh sách từ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: snow;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* 🔹 SAFE AREA CHO IPHONE NOTCH */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

.app-container {
  width: 100%;
  max-width: 375px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card {
  background: linen;
  border-radius: 20px;
  padding: 20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  gap: 15px;
  height: 100%;
  overflow-y: auto;
}

/* INPUT */
.input-group {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.input-group label {
  font-weight: 600;
  font-size: 15px;
  color: #555;
  margin-bottom: 6px;
}

.input-group input,
.input-group textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  transition: 0.2s;
}

.input-group input:focus,
.input-group textarea:focus {
  outline: none;
  border-color: #a5b4fc;
  box-shadow: 0 0 0 2px rgba(165,180,252,0.3);
}

textarea {
  min-height: 180px;
  max-height: 250px;
  resize: vertical;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: gainsboro;
  transition: all 0.15s ease;
  font-size: 15px;
  color: #555;
  margin-top: 10px;
}

.btn:hover {
  filter: brightness(0.95);
  transform: translateY(-2px);
}

.btn:active {
  transform: scale(0.97);
  filter: brightness(0.9);
}

/* 🔥 POPUP NỔI */
#saveMessage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;

  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.3);
  z-index: 999;
}

.saved-box {
  padding: 20px 30px;
  border-radius: 15px;
  background: white;
  font-size: 16px;
  font-weight: 600;
  color: #065f46;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  animation: pop 0.3s ease;
}

@keyframes pop {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="app-container">
  <div class="card">

    <div class="input-group">
      <label>Tên danh sách</label>
      <input type="text" id="listName">
    </div>

    <div class="input-group">
      <label>Từ tiếng Anh</label>
      <textarea id="englishWords"></textarea>
    </div>

    <div class="input-group">
      <label>Nghĩa tiếng Việt</label>
      <textarea id="vietnameseWords"></textarea>
    </div>

    <button class="btn" onclick="saveList()">Lưu danh sách</button>

  </div>
</div>

<!-- 🔥 POPUP NẰM NGOÀI -->
<div id="saveMessage">
  <div class="saved-box">✅ Đã lưu danh sách!</div>
</div>




<script>
function saveList(){

  const nameEl = document.getElementById('listName');
  const enEl = document.getElementById('englishWords');
  const viEl = document.getElementById('vietnameseWords');

  const name = (nameEl?.value || "").trim();
  const en = (enEl?.value || "").split('\n').map(t=>t.trim()).filter(Boolean);
  const vi = (viEl?.value || "").split('\n').map(t=>t.trim()).filter(Boolean);

  // ❗ validate chắc chắn
  if(!name){
    alert("Chưa nhập tên danh sách");
    return;
  }

  if(en.length === 0 || vi.length === 0){
    alert("Danh sách trống");
    return;
  }

  if(en.length !== vi.length){
    alert("Số dòng Anh - Việt không khớp");
    return;
  }

  // 🔥 build data an toàn 100%
  const words = [];

  for(let i=0;i<en.length;i++){
    words.push({
      en: en[i],
      vi: vi[i],

      // tạm thời dùng text-only (ổn định trước)
      enUrl: `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(en[i])}&tl=en&client=tw-ob`,
      viUrl: `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(vi[i])}&tl=vi&client=tw-ob`
    });
  }

  // 🔥 READ OLD DATA SAFELY
  let allLists = [];
  try {
    const raw = localStorage.getItem("wordLists");
    allLists = raw ? JSON.parse(raw) : [];
    if(!Array.isArray(allLists)) allLists = [];
  } catch(e){
    allLists = [];
  }

  // 🔥 PUSH NEW LIST
  allLists.push({
    id: Date.now(),
    name: name,
    words: words
  });

  // 🔥 SAVE
  localStorage.setItem("wordLists", JSON.stringify(allLists));

  console.log("Saved:", allLists);

  alert("Đã lưu danh sách!");

  // optional redirect
  // window.location.href = "index.html";
}
</script>



</body>
</html>
