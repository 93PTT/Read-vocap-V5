<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chính tả</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">



<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}

.header{
	text-align:center;
	margin-top:10px;
}



.cat3-img{
	width:100%;
	max-width:250px;
	border-radius:20px;
}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:350px;
		margin:-10px auto;
		background:lightslategray;
		border-radius:30px;
		padding:4px;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}





	.box-1{
		width:300px;
		height:100px;
		margin:auto;
		margin-top:10px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2{
		width:300px;
		height: 100px;
		margin:10px auto;
		margin-top:30px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}




	.box-3{
		width:100px;
		height:35px;
		margin-top:10px;
		margin-left:240px;
		border-radius:10px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:15px;
		font-weight:600;
		color:#555555;
		justify-content:center;
	}





	.feedback {
  		text-align: center;
  		font-weight: 600;
  		margin-top: 10px;
  		min-height: 20px;
  		border-radius: 12px;
  		padding: 6px 0;
		height: 35px;
		text-align: center;
		justify-content: center;
		align-items: center;
	}


	.feedback.correct { background:transparent; color:#1b5e20; }
	.feedback.wrong { background:transparent; color:#b71c1c; }


	

</style>
</head>





<body>
	<div class="header">
		<img src="cat3.png" class="cat3-img">
	</div>

	<div class="app-container">
		<div class="card-1">
			<div class="box box-3" id="btnO3">Từ còn lại</div>
			<div class="box box-1" id="btnO1">Ô 1</div>
			<div class="box box-2" id="btnO2">Ô 2</div>
			<div class="feedback" id="feedback"></div>
		</div>
	</div>


<script>

	let selectedList = JSON.parse(localStorage.getItem('selectedList'));
	let currentList = selectedList?.words || [];
	shuffleArray(currentList);
	let currentIndex = 0;


	function renderWord(){
	if(currentList.length === 0){
        document.getElementById("btnO1").innerText = "Không có dữ liệu";
        document.getElementById("btnO2").innerText = "";
        document.getElementById("btnO3").innerText = "";
        return;
    	}
    	let word = currentList[currentIndex];
    	document.getElementById("btnO1").innerText = word.vi;
    	document.getElementById("btnO2").innerHTML = `
        <input id="answerInput" type="text"
            autocomplete="off"
            style="
                width:100%;
                height:100%;
                border:none;
                outline:none;
                font-size:17px;
                font-weight:600;
                text-align:center;
                border-radius:20px;
            "
            onkeydown="handleEnter(event)"
        />
    	`;
    	document.getElementById("btnO3").innerText =
        `Còn ${currentList.length - currentIndex - 1} từ`;
    	let fb = document.getElementById("feedback");
    	fb.innerText = "";
    	fb.className = "feedback";
    	setTimeout(()=>{
        document.getElementById("answerInput")?.focus();
    	},100);
	}



	function handleEnter(e){
    	if(e.key !== "Enter") return;
    	let word = currentList[currentIndex];
    	let input = document.getElementById("answerInput").value.trim();
    	let feedback = document.getElementById("feedback");
    	if(input.toLowerCase() === word.en.toLowerCase()){
        feedback.innerText = "Chính xác ✔";
        feedback.className = "feedback correct";
        setTimeout(()=>{
            nextWord();
        }, 700);
    	} else {
        feedback.innerText = word.en;
        feedback.className = "feedback wrong";
        let wrongWord = currentList.splice(currentIndex, 1)[0];
        let newPos = Math.min(currentIndex + 3, currentList.length);
        currentList.splice(newPos, 0, wrongWord);
        setTimeout(()=>{
            renderWord();
        }, 1500);
    	}
	}



	function nextWord(){
    	currentIndex++;
    	if(currentIndex >= currentList.length){
        showFinish();
        return;
    	}
    	renderWord();
	}



	function showFinish(){
    	document.getElementById("btnO1").innerText = "FINISH 🎉";
    	document.getElementById("btnO2").innerHTML = "";
    	document.getElementById("btnO3").innerText = "";

    	let fb = document.getElementById("feedback");
    	fb.innerText = "Hoàn thành danh sách ✔";
    	fb.className = "feedback correct";
	}



	function backWord(){
    	if(currentIndex > 0){
        currentIndex--;
        renderWord();
    	}
	}


	function shuffleArray(array){
    	if(!array || array.length <= 1) return;
    	for(let i = array.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    	}
	}
	renderWord();

</script>
</body>
</html>
