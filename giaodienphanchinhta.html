<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chính tả</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">



<style>
	*{box-sizing:border-box;}
	body{
		margin:0;
		font-family:'Poppins', sans-serif;
		background:snow;
	}

.header{
	text-align:center;
	margin-top:10px;
}



.cat2-img{
	width:100%;
	max-width:250px;
	border-radius:20px;
}


	.app-container{
		max-width:375px;
		margin:auto;
		min-height:100vh;
		display:flex;
		flex-direction:column;
		padding:10px;
	}



	.card-1{
		width: 350px;
		height:350px;
		margin:-10px auto;
		background:lightslategray;
		border-radius:30px;
		padding:4px;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);
	}



	.card-2{
		width: 350px;
		height:70px;
		margin:50px auto;
		background:lightslategray;
		border-radius:30px;
		padding:4px;
		display: flex;
		justify-content: center;
		box-shadow:0 20px 50px rgba(0,0,0,0.38);

		
	}




	.box-1{
		width:300px;
		height:100px;
		margin:auto;
		margin-top:10px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}



	.box-2{
		width:300px;
		height: 100px;
		margin:10px auto;
		margin-top:30px;
		border-radius:20px;
		background:white;
		display:flex;
		align-items:center;
		font-size:17px;
		font-weight:600;
		color:#555555;
		justify-content:center;
		box-shadow:0 8px 20px rgba(0,0,0,0.28);
		text-align: center;
	}




	.box-3{
		width:100px;
		height:35px;
		margin-top:10px;
		margin-left:240px;
		border-radius:10px;
		background:transparent;
		display:flex;
		align-items:center;
		font-size:15px;
		font-weight:600;
		color:#555555;
		justify-content:center;
	}




	.grid-1{
		display:grid;
		grid-template-columns:1fr 1fr;
		gap:130px;
	}


	.button-1{
		border: none;
		outline: none;
		background: none;
		width: 75px;
		height: 40px;
		border-radius:15px;
		margin:auto;
		margin-left:15px;
		display:flex;
		align-items:center;
		justify-content:center;
		background:whitesmoke;
		font-size:16px;
		font-weight:600;
		color:#555555;
		box-shadow:0 8px 20px rgba(0,0,0,0.38);
		cursor:pointer;
		transition:0.2s;
	}
	
	.button-1:hover{ background:orange; }
	.button-1:active{transform:scale(0.95);}




	.feedback {
  		text-align: center;
  		font-weight: 600;
  		margin-top: 10px;
  		min-height: 20px;
  		border-radius: 12px;
  		padding: 6px 0;
		height: 35px;
		text-align: center;
		justify-content: center
		align-items: center;
	}


	.feedback.correct { background:snow; color:#0a7d3b; }
	.feedback.wrong { background:snow; color:#721c24; }


	

</style>
</head>





<body>
	<div class="header">
		<img src="cat2.png" class="cat2-img">
	</div>

	<div class="app-container">
		<div class="card-1">
			<div class="box box-3" id="btnO3">Từ còn lại</div>
			<div class="box box-1" id="btnO1">Ô 1</div>
			<div class="box box-2" id="btnO2">Ô 2</div>
		</div>

		<div class="card-2 grid-1">
    			<button class="button-1" onclick="backWord()">Back</button>
    			<button class="button-1" onclick="nextWord()">Next</button>
		</div>
	</div>






</script>
</body>
</html>
