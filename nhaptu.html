<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chọn danh sách để học nhé!</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: #f3f3f3;
  display: flex;
  justify-content: center;
  padding: 30px 10px;
}

.app-container {
  max-width: 375px;
  width: 100%;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header img {
  width: 100%;
  max-width: 280px;
  border-radius: 20px;
}

.header .title {
  margin-top: 10px;
  font-style: italic;
  color: #555555;
  font-size: 15px;
  font-weight:600;

}

.card {
  background: white;
  border-radius: 20px;
  padding: 25px 20px 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  justify-items: center;
  position: relative;
}

/* BOX */
.box {
  padding: 15px 20px;
  border-radius: 15px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;

  transition: all 0.15s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* Hover */
.box:hover {
  filter: brightness(0.95);
  transform: translateY(-2px);
}

/* Click (nhấn xuống) */
.box:active {
  transform: scale(0.97);
  filter: brightness(0.9);
}

/* Màu */
.box-list { background: #FDE2CA; color: #555555; }
.box-csv { background: #DDF4E7; color: #555555; }
.box-manual { background: #E3ECFF; color: #555555; }

/* Span 2 cột */
.box-top {
  grid-column: 1 / 3;
}

/* DROPDOWN */
.dropdown {
  position: absolute;
  top: 75px;
  left: 50%;
  transform: translate(-50%, -10px);
  
  opacity: 0;
  pointer-events: none;

  width: 180px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  overflow: hidden;

  transition: all 0.2s ease;
  z-index: 10;
}

.dropdown.show {
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
}

/* ITEM */
.dropdown-item {
  padding: 12px;
  cursor: pointer;
  text-align: center;
  border-bottom: 1px solid #eee;

  transition: all 0.15s ease;
}

.dropdown-item:last-child {
  border-bottom: none;
}

/* Hover dropdown */
.dropdown-item:hover {
  background: #e6e6ff;
  transform: scale(1.03);
}

/* Click dropdown */
.dropdown-item:active {
  background: #d4d4ff;
  transform: scale(0.97);
}
</style>
</head>

<body>

<div class="app-container">

  <div class="header">
    <img src="cat.png" alt="Cat">
    <div class="title">Chọn danh sách để học nhé!</div>
  </div>

  <div class="card">
    <div class="grid">

      <div class="box box-list box-top" id="listBtn">
        DANH SÁCH ĐÃ TẠO
      </div>

      <div class="dropdown" id="listDropdown">
        <div class="dropdown-item">Danh sách 1</div>
        <div class="dropdown-item">Danh sách 2</div>
        <div class="dropdown-item">Danh sách 3</div>
      </div>

      <div class="box box-csv" onclick="goCSV()">
        NHẬP TỪ FILE CSV
      </div>

      <div class="box box-manual" onclick="goManual()">
        NHẬP THỦ CÔNG
      </div>

    </div>
  </div>

</div>

<script>
const listBtn = document.getElementById('listBtn');
const listDropdown = document.getElementById('listDropdown');

listBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  listDropdown.classList.toggle('show');
});

document.addEventListener('click', (e) => {
  if (!listBtn.contains(e.target) && !listDropdown.contains(e.target)) {
    listDropdown.classList.remove('show');
  }
});

const items = document.querySelectorAll('.dropdown-item');

items.forEach(item => {
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    alert("Chọn: " + item.textContent);
    listDropdown.classList.remove('show');
  });
});
function loadLists() {
  const listDropdown = document.getElementById('listDropdown');
  listDropdown.innerHTML = ''; // Xóa các item cũ

  const allLists = JSON.parse(localStorage.getItem('wordLists') || '[]');

  if(allLists.length === 0){
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.textContent = 'Chưa có danh sách nào';
    item.style.cursor = 'default';
    listDropdown.appendChild(item);
    return;
  }

  allLists.forEach(list => {
    const item = document.createElement('div');
    item.className = 'dropdown-item';
    item.textContent = list.name;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      alert("Chọn: " + list.name);
      listDropdown.classList.remove('show');
    });
    listDropdown.appendChild(item);
  });
}

// Gọi khi load trang
window.addEventListener('DOMContentLoaded', loadLists);

function goCSV(){
  alert("Nhập CSV");
}

function goManual(){
  window.location.href = "nhapthucong.html";
}

</script>

</body>
</html>
